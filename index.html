<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>三视图-教学软件</title>
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #E0F7FA; 
            font-family: 'Avenir Next', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; 
            color: #5D4037; 
            touch-action: manipulation;
            user-select: none;
        }

        #main-wrapper { 
            display: grid;
            grid-template-areas: 
                "header header"
                "ui main"
                "bottom bottom";
            grid-template-columns: 280px 1fr; 
            grid-template-rows: 70px 1fr 220px; 
            width: 100%; height: 100%;
            gap: 12px; padding: 12px; box-sizing: border-box;
            background-image: radial-gradient(#B2EBF2 10%, transparent 10%);
            background-size: 30px 30px;
            position: fixed;
            left:0; top:0;
        }

        #mode-header { 
            grid-area: header;
            background: #FFF; border-radius: 50px; 
            border: 6px solid #B2EBF2; 
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 0px rgba(178, 235, 242, 0.5);
            padding: 0 10px;
        }

        .mode-btn { 
            padding: 12px 20px; border: none; 
            background: #E1F5FE; color: #0277BD; cursor: pointer; 
            font-weight: bold; margin: 0 10px;
            border-radius: 30px; 
            font-size: 14px; 
            transition: all 0.2s ease;
            white-space: nowrap;
            min-height: 46px;
        }
        .mode-btn.active { background: #81D4FA; color: white; transform: scale(1.05); }

        #ui-panel { 
            grid-area: ui;
            background: #FFF; border-radius: 40px; 
            border: 6px solid #C8E6C9; 
            box-shadow: 0 10px 0px rgba(200, 230, 201, 0.5);
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            box-sizing: border-box;
            height: 100%;
            overflow: hidden; 
        }

        #ui-build-group, #ui-challenge-group, #inference-sidebar-v3 { display: none !important; }

        .mode-build #ui-build-group { 
            display: flex !important; 
            flex-direction: column;
            justify-content: space-around; 
            height: 100%;
            width: 100%;
        }

        .challenge-layout #ui-challenge-group { 
            display: flex !important; 
            flex-direction: column;
            align-items: center; 
            justify-content: flex-start;
            width: 100%;
            height: 100%; 
            padding-top: 10px;
            overflow-y: auto;
        }

        .challenge-layout #main-wrapper {
            grid-template-columns: 320px 1fr;
        }

        .inference-layout #ui-panel, .inference-layout #bottom-panel { display: none !important; }
        .inference-layout #inference-sidebar-v3 { display: flex !important; }

        #grid-control-panel {
            display: grid !important;
            grid-template-columns: repeat(10, 24px) !important; 
            grid-template-rows: repeat(10, 24px) !important;
            gap: 1px;
            background: #A5D6A7;
            border: 3px solid #C8E6C9;
            margin: 10px auto; 
            width: fit-content;
            flex-shrink: 0; 
        }

        .grid-cell {
            background: #FFF; 
            width: 100%; height: 24px;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: bold; color: #2E7D32; 
            cursor: pointer;
        }
        .grid-cell.active {
            background: #81C784 !important; 
            color: white !important;
        }

        #ui-panel button, #size-input {
            width: 90% !important; 
            display: block !important; 
            box-sizing: border-box !important;
            margin-bottom: 8px !important;
            margin-left: auto;
            margin-right: auto;
            flex-shrink: 0; 
            font-size: 14px !important; 
            min-height: 46px;
        }

        #size-input, #ui-panel button, .inf-action-btn, .inf-reset-btn {
            padding: 12px 8px; border: none; background: #E8F5E9; color: #2E7D32;
            border-radius: 20px; font-size: 14px; font-weight: bold;
            box-shadow: 0 5px 0px #A5D6A7; transition: 0.1s; text-align: center; cursor: pointer;
        }
        #size-input { background: #F1F8E9; border: 3px solid #C8E6C9; box-shadow: none; outline: none; color: #5D4037; height: auto; }

        #clear-grid-btn-challenge {
            background-color: #FF5252 !important; 
            color: white !important;
            box-shadow: 0 5px 0px #D32F2F !important;
            width: 90% !important;
            padding: 12px;
            border-radius: 20px;
            margin-top: 10px !important;
        }

        #clear-btn-build, #inf-clear-all {
            background-color: #FF5252 !important; color: white !important;
            box-shadow: 0 5px 0px #D32F2F !important;
        }
        #ui-panel button:active { transform: translateY(3px); box-shadow: 0 2px 0px #A5D6A7; }

        #canvas-container { 
            grid-area: main;
            background: #FFF; border-radius: 40px; 
            border: 6px solid #FFECB3; 
            display: block !important;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 0px rgba(255, 236, 179, 0.5);
            width: 100%;
            height: 100%;
        }
        #canvas-container canvas { display: block; width: 100% !important; height: 100% !important; }

        #bottom-panel { 
            grid-area: bottom;
            background: #FFF; border-radius: 40px; 
            border: 6px solid #F8BBD0; 
            box-shadow: 0 10px 0px rgba(248, 187, 208, 0.5);
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            padding: 10px; 
            position: relative;
            box-sizing: border-box;
        }

        .projection-card {
            display: flex;
            flex-direction: column;
            align-items: center;    
            justify-content: center;
            height: 100%;
        }

        .mode-build .projection-card canvas, 
        .projection-card canvas { 
            width: 160px !important;
            height: 160px !important; 
            border: 5px solid #F8BBD0; 
            border-radius: 0 !important; 
            background-color: #FFFFFF;
            box-shadow: 0 6px 0px rgba(248, 187, 208, 0.3);
            display: block; 
        }

        .projection-card .label { 
            margin-top: 8px; 
            font-weight: bold; 
            font-size: 14px; 
            background: #F8BBD0; 
            color: #880E4F; 
            padding: 4px 12px; 
            border-radius: 15px; 
            text-align: center;
            width: fit-content; 
        }

        .color-front { background-color: #90CAF9 !important; color: #1565C0 !important; box-shadow: 0 5px 0px #64B5F6 !important; }
        .color-left { background-color: #EF9A9A !important; color: #B71C1C !important; box-shadow: 0 5px 0px #E57373 !important; }
        .color-top { background-color: #FFF59D !important; color: #F57F17 !important; box-shadow: 0 5px 0px #FFF176 !important; }

        .inference-layout #main-wrapper {
            grid-template-areas: "header header" "inf-side main";
            grid-template-columns: 360px 1fr;
            grid-template-rows: 70px 1fr;
        }

        #inference-sidebar-v3 {
            grid-area: inf-side;
            border-radius: 40px; border: 6px solid #B0BEC5; background: #FFF;
            display: flex; flex-direction: column; padding: 20px; gap: 15px;
            box-sizing: border-box; height: 100%; overflow-y: auto;
        }

        .inference-views-container {
            display: grid;
            grid-template-areas: 
                "front-view left-view"
                "top-view   none";
            grid-template-columns: 1fr 1fr; 
            grid-template-rows: auto auto;
            gap: 15px;
            width: 100%;
            margin: 10px 0;
        }

        .inf-view-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .inf-view-card .canvas-wrapper {
            width: 160px;
            height: 160px;
            border: 4px solid #CFD8DC;
            background: #FFF;
            border-radius: 0 !important; 
            box-shadow: 0 6px 0 rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            padding: 0; 
            overflow: hidden;
        }

        .inf-view-card canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }

        .inf-view-card .label {
            margin-top: 8px;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            min-width: 60%; 
            padding: 4px 12px;
            border-radius: 20px; 
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 0px rgba(0,0,0,0.1);
        }

        .inf-area-front { grid-area: front-view; }
        .inf-area-left  { grid-area: left-view; }
        .inf-area-top   { grid-area: top-view; }

        .inf-v3-actions {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }

        .inf-btn-group-horizontal {
            display: flex;
            width: 100%;
            gap: 15px;
        }

        .inf-action-btn {
            flex: 1;
            padding: 14px 0 !important;
            font-size: 14px !important;
            border-radius: 25px !important;
            min-height: 46px;
        }

        .inf-footer-group {
            margin-top: auto; 
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .inf-v3-stats {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 14px 0;
            background: #F1F8E9; 
            border: 3px solid #C8E6C9; 
            border-radius: 25px;
            box-shadow: 0 6px 0px #A5D6A7; 
            font-size: 14px;
            color: #2E7D32;
            font-weight: bold;
        }

        #inf-v3-count {
            color: #FF5252;
            font-size: 18px;
            font-weight: 900;
        }

        .inf-reset-btn {
            width: 100% !important;
            min-height: 46px;
        }

        .modal-overlay { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100vw; height: 100vh; 
            background: rgba(0,0,0,0.7); 
            display: none; 
            justify-content: center; 
            align-items: center; 
            z-index: 99999;
        }
        .modal-content { 
            background: #fff; 
            padding: 30px; 
            border-radius: 20px; 
            max-width: 500px; 
            width: 85%; 
            line-height: 1.9;
            text-align: left;
        }
        .modalBtn {
            background: #81D4FA;
            color: white;
            border: 0;
            padding: 10px 26px;
            border-radius: 14px;
            margin-top: 10px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body class="mode-build"> 
    <div id="main-wrapper">
        <header id="mode-header">
            <div class="mode-group">
                <button id="mode-build" class="mode-btn active">建模绘制模式</button>
                <button id="mode-challenge" class="mode-btn">平面标数模式</button>
                <button id="mode-inference" class="mode-btn">立方体块最大最小数量问题</button>
            </div>
        </header>

        <main id="canvas-container"></main>

        <aside id="ui-panel">
            <section id="ui-build-group">
                <button onclick="showBuildHelp()">❔ 建模使用说明</button>
                <input type="text" id="size-input" placeholder="长*宽*高">
                <button onclick="quickGenerate()">快速生成</button>
                <button class="color-front" onclick="genFront()">生成正视图</button>
                <button class="color-left" onclick="genLeft()">生成左视图</button>
                <button class="color-top" onclick="genTop()">生成俯视图</button>
                <button onclick="resetView()">自由视角</button>
                <button onclick="clearScene()">场景重置</button>
            </section>
            <section id="ui-challenge-group">
                <button onclick="showMarkHelp()">🔢 标数法使用说明</button>
                <div id="grid-control-panel"></div>
                <button onclick="clearGrid()">清空所有标数</button>
            </section>
        </aside>

        <aside id="inference-sidebar-v3">
            <p>点击下方视口方格绘制轮廓，分析最大最小问题。</p>
            <div class="inference-views-container">
                <div class="inf-view-card"><div class="canvas-wrapper"><canvas width="240" height="240"></canvas></div><div class="label color-left">左视图</div></div>
                <div class="inf-view-card"><div class="canvas-wrapper"><canvas width="240" height="240"></canvas></div><div class="label color-front">正视图</div></div>
                <div class="inf-view-card"><div class="canvas-wrapper"><canvas width="240" height="240"></canvas></div><div class="label color-top">俯视图</div></div>
            </div>
            <button class="inf-action-btn">最大数量</button>
            <button class="inf-action-btn">最小数量</button>
            <div class="inf-v3-stats">积木总数：<strong id="inf-v3-count">0</strong></div>
            <button class="inf-reset-btn">清空所有视口</button>
        </aside>

        <footer id="bottom-panel">
            <div class="projection-card"><canvas width="200" height="200"></canvas><div class="label">正视图</div></div>
            <div class="projection-card"><canvas width="200" height="200"></canvas><div class="label">左视图</div></div>
            <div class="projection-card"><canvas width="200" height="200"></canvas><div class="label">俯视图</div></div>
        </footer>
    </div>

    <div class="modal-overlay" id="buildModal">
        <div class="modal-content">
            <h3>📘 建模模式操作说明</h3>
            <p>🖱️ <strong>鼠标操作：</strong></p>
            <p>• 左键单击 = 添加立方体</p>
            <p>• 右键单击 = 删除立方体</p>
            <p>• 鼠标拖动 = 旋转视角</p>
            <p>• 滚轮滚动 = 缩放视角</p>
            <br>
            <p>📱 <strong>平板 / 手机触控：</strong></p>
            <p>• 单击 = 添加立方体</p>
            <p>• 双击 = 删除立方体</p>
            <p>• 单指拖动 = 旋转3D视角</p>
            <p>• 双指捏合 = 缩放视角</p>
            <button class="modalBtn" onclick="closeAllModals()">确定</button>
        </div>
    </div>

    <div class="modal-overlay" id="markModal">
        <div class="modal-content">
            <h3>🔢 平面标数模式说明</h3>
            <p>🖱️ <strong>鼠标：</strong> 点击方格进行标注</p>
            <p>📱 <strong>平板：</strong> 手指点击方格进行标注</p>
            <p>用于练习三视图投影、方格计数、平面坐标训练</p>
            <button class="modalBtn" onclick="closeAllModals()">确定</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, controls;
        let cubes = [];

        // 页面加载后强制重绘 canvas
        window.addEventListener('DOMContentLoaded', () => {
            const allowed = ["localhost","127.0.0.1","malifei777-sudo.github.io"];
            if(!allowed.includes(location.hostname)){
                document.body.innerHTML = "<h1>未经授权使用</h1>";
                return;
            }

            initThree();
            initGrid();
            bindClick();
            bindModes();

            // 修复 GitHub 画布尺寸
            setTimeout(() => {
                window.dispatchEvent(new Event('resize'));
            }, 100);
        });

        // 修复窗口大小变化
        window.addEventListener('resize', () => {
            const container = document.getElementById('canvas-container');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        function initThree() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);
            camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            const light = new THREE.AmbientLight(0xffffff, 1);
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(10,10,10);
            scene.add(light, dirLight);

            camera.position.set(8,8,8);
            controls.update();
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        // 点击绑定稳定化
        function bindClick() {
            const canvasArea = document.getElementById('canvas-container');
            let last = 0;

            canvasArea.addEventListener('click', (e) => {
                e.preventDefault();
                const now = Date.now();
                if(now - last < 250) {
                    removeCube();
                } else {
                    setTimeout(() => {
                        if(Date.now() - last > 240) addCube();
                    }, 250);
                }
                last = now;
            });

            canvasArea.addEventListener('contextmenu', e => {
                e.preventDefault();
                removeCube();
            });
        }

        function addCube() {
            const geo = new THREE.BoxGeometry(1,1,1);
            const mat = new THREE.MeshLambertMaterial({ color: 0x64B5F6 });
            const cube = new THREE.Mesh(geo, mat);
            cube.position.set(0, cubes.length, 0);
            scene.add(cube);
            cubes.push(cube);
            document.getElementById('inf-v3-count').textContent = cubes.length;
        }

        function removeCube() {
            if(!cubes.length) return;
            scene.remove(cubes.pop());
            document.getElementById('inf-v3-count').textContent = cubes.length;
        }

        function quickGenerate() {
            const val = document.getElementById('size-input').value.trim();
            if(!val.includes('*')) return alert('格式：长*宽*高');
            const [w,d,h] = val.split('*').map(Number);
            if(!w||!d||!h) return alert('输入错误');
            clearScene();
            for(let x=0;x<w;x++){
                for(let y=0;y<h;y++){
                    for(let z=0;z<d;z++){
                        const geo = new THREE.BoxGeometry(1,1,1);
                        const mat = new THREE.MeshLambertMaterial({ color: 0x81C784 });
                        const cube = new THREE.Mesh(geo,mat);
                        cube.position.set(x,y,z);
                        scene.add(cube);
                        cubes.push(cube);
                    }
                }
            }
            document.getElementById('inf-v3-count').textContent = cubes.length;
        }

        function clearScene() {
            cubes.forEach(c => scene.remove(c));
            cubes = [];
            document.getElementById('inf-v3-count').textContent = 0;
        }

        function resetView() {
            camera.position.set(8,8,8);
            controls.target.set(0,0,0);
            controls.update();
        }

        function genFront(){}
        function genLeft(){}
        function genTop(){}

        function initGrid() {
            const panel = document.getElementById('grid-control-panel');
            panel.innerHTML = '';
            for(let i=0;i<100;i++){
                const cell = document.createElement('div');
                cell.className = 'grid-cell';
                cell.textContent = '0';
                cell.onclick = () => {
                    cell.classList.toggle('active');
                    cell.textContent = cell.classList.contains('active') ? '1' : '0';
                };
                panel.appendChild(cell);
            }
        }

        function clearGrid() {
            document.querySelectorAll('.grid-cell').forEach(c => {
                c.classList.remove('active');
                c.textContent = '0';
            });
        }

        function showBuildHelp() {
            closeAllModals();
            document.getElementById('buildModal').style.display = 'flex';
        }
        function showMarkHelp() {
            closeAllModals();
            document.getElementById('markModal').style.display = 'flex';
        }
        function closeAllModals() {
            document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none');
        }

        // 模式切换 —— 完全保留各自内容
        function bindModes() {
            const mBuild = document.getElementById('mode-build');
            const mChallenge = document.getElementById('mode-challenge');
            const mInference = document.getElementById('mode-inference');
            const wrapper = document.getElementById('main-wrapper');

            function setMode(mode) {
                document.body.className = '';
                wrapper.classList.remove('challenge-layout','inference-layout');

                if(mode === 'build'){
                    document.body.classList.add('mode-build');
                } else if(mode === 'challenge'){
                    wrapper.classList.add('challenge-layout');
                } else if(mode === 'inference'){
                    wrapper.classList.add('inference-layout');
                }

                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                (mode === 'build' ? mBuild : mode === 'challenge' ? mChallenge : mInference).classList.add('active');
                
                // 修复切换后 canvas 消失
                window.dispatchEvent(new Event('resize'));
            }

            mBuild.onclick = () => setMode('build');
            mChallenge.onclick = () => setMode('challenge');
            mInference.onclick = () => setMode('inference');

            setMode('build');
        }
    </script>
</body>
</html>
