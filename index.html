<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>三视图-教学软件 | 3D积木块交互</title>
    <style>
        /* 重置样式 & 布局修复 - 确保在任何域名下都完整渲染 */
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #E0F7FA; 
            font-family: 'Avenir Next', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; 
            color: #5D4037; 
            touch-action: manipulation;
            user-select: none;
        }

        #main-wrapper { 
            display: grid;
            grid-template-areas: 
                "header header"
                "ui main"
                "bottom bottom";
            grid-template-columns: 16vw 1fr; 
            grid-template-rows: 8vh 1fr 28vh; 
            width: 100vw; height: 100vh;
            gap: 1.5vh; padding: 1.5vh; box-sizing: border-box;
            background-image: radial-gradient(#B2EBF2 10%, transparent 10%);
            background-size: 30px 30px;
        }

        #mode-header { 
            grid-area: header;
            background: #FFF; border-radius: 50px; 
            border: 6px solid #B2EBF2; 
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 0px rgba(178, 235, 242, 0.5);
            padding: 0.5vh 0;
        }

        .mode-btn { 
            padding: 1vh 1.5vw; border: none; 
            background: #E1F5FE; color: #0277BD; cursor: pointer; 
            font-weight: bold; margin: 0 10px;
            border-radius: 30px; 
            font-size: clamp(12px, 1.4vh, 16px); 
            transition: all 0.2s ease;
            white-space: nowrap;
            min-height: 46px;
        }
        .mode-btn.active { background: #81D4FA; color: white; transform: scale(1.05); }

        #ui-panel { 
            grid-area: ui;
            background: #FFF; border-radius: 40px; 
            border: 6px solid #C8E6C9; 
            box-shadow: 0 10px 0px rgba(200, 230, 201, 0.5);
            padding: 2vh 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            box-sizing: border-box;
            height: 100%;
            overflow-y: auto;
        }

        /* 显示隐藏逻辑 - 修复类名对应问题 */
        #ui-build-group, #ui-challenge-group, #inference-sidebar-v3 { display: none; }

        body.mode-build #ui-build-group { 
            display: flex !important; 
            flex-direction: column;
            justify-content: space-around; 
            height: 100%;
            width: 100%;
        }

        .challenge-layout #ui-challenge-group { 
            display: flex !important; 
            flex-direction: column;
            align-items: center; 
            justify-content: space-around;
            width: 100%;
            height: 100%; 
        }

        .challenge-layout #main-wrapper {
            grid-template-columns: 24vw 1fr;
        }

        .inference-layout #ui-panel, .inference-layout #bottom-panel { display: none; }
        .inference-layout #inference-sidebar-v3 { display: flex !important; }

        #grid-control-panel {
            display: grid !important;
            grid-template-columns: repeat(10, 2.2vh) !important; 
            grid-template-rows: repeat(10, 2.2vh) !important;
            gap: 1px;
            background: #A5D6A7;
            border: 3px solid #C8E6C9;
            margin: 0.5vh auto; 
            width: fit-content;
            flex-shrink: 1; 
        }

        .grid-cell {
            background: #FFF; 
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2vh; font-weight: bold; color: #2E7D32; 
            cursor: pointer;
        }
        .grid-cell.active {
            background: #81C784 !important; 
            color: white !important;
        }

        #ui-panel button, #size-input {
            width: 90% !important; 
            display: block !important; 
            box-sizing: border-box !important;
            margin-bottom: 0.8vh !important;
            margin-left: auto;
            margin-right: auto;
            font-size: clamp(11px, 1.3vh, 14px) !important; 
            min-height: 46px;
        }

        #size-input, #ui-panel button, .inf-action-btn, .inf-reset-btn {
            padding: 1.2vh 8px; border: none; background: #E8F5E9; color: #2E7D32;
            border-radius: 20px; font-size: 13px; font-weight: bold;
            box-shadow: 0 5px 0px #A5D6A7; transition: 0.1s; text-align: center; cursor: pointer;
        }
        #size-input { background: #F1F8E9; border: 3px solid #C8E6C9; box-shadow: none; outline: none; color: #5D4037; height: auto; }

        #clear-grid-btn-challenge {
            background-color: #FF5252 !important; 
            color: white !important;
            box-shadow: 0 5px 0px #D32F2F !important;
            width: 90% !important;
            padding: 1.2vh;
            border-radius: 20px;
            margin-top: 0.5vh !important;
        }

        #clear-btn-build, #inf-clear-all {
            background-color: #FF5252 !important; color: white !important;
            box-shadow: 0 5px 0px #D32F2F !important;
        }
        #ui-panel button:active { transform: translateY(3px); box-shadow: 0 2px 0px #A5D6A7; }

        #canvas-container { 
            grid-area: main;
            background: #FFF; border-radius: 40px; 
            border: 6px solid #FFECB3; 
            display: block !important;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 0px rgba(255, 236, 179, 0.5);
            contain: strict;
        }
        #canvas-container canvas { display: block; width: 100% !important; height: 100% !important; }

        #bottom-panel { 
            grid-area: bottom;
            background: #FFF; border-radius: 40px; 
            border: 6px solid #F8BBD0; 
            box-shadow: 0 10px 0px rgba(248, 187, 208, 0.5);
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            padding: 1vh; 
            position: relative;
            box-sizing: border-box;
        }

        .projection-card {
            display: flex;
            flex-direction: column;
            align-items: center;    
            justify-content: center;
            height: 100%;
        }

        .projection-card canvas { 
            width: auto !important;
            height: 20vh !important; 
            max-width: 180px; 
            max-height: 180px;
            aspect-ratio: 1 / 1;
            border: 5px solid #F8BBD0; 
            border-radius: 0 !important; 
            background-color: #FFFFFF;
            box-shadow: 0 6px 0px rgba(248, 187, 208, 0.3);
            display: block; 
        }

        .projection-card .label { 
            margin-top: 0.5vh; 
            font-weight: bold; 
            font-size: clamp(10px, 1.2vh, 14px); 
            background: #F8BBD0; 
            color: #880E4F; 
            padding: 2px 1.5vw; 
            border-radius: 15px; 
            text-align: center;
            width: fit-content; 
        }

        .color-front { background-color: #90CAF9 !important; color: #1565C0 !important; box-shadow: 0 5px 0px #64B5F6 !important; }
        .color-left { background-color: #EF9A9A !important; color: #B71C1C !important; box-shadow: 0 5px 0px #E57373 !important; }
        .color-top { background-color: #FFF59D !important; color: #F57F17 !important; box-shadow: 0 5px 0px #FFF176 !important; }

        .inference-layout #main-wrapper {
            grid-template-areas: "header header" "inf-side main";
            grid-template-columns: 32vw 1fr;
            grid-template-rows: 8vh 1fr;
        }

        #inference-sidebar-v3 {
            grid-area: inf-side;
            border-radius: 40px; border: 6px solid #B0BEC5; background: #FFF;
            display: flex; flex-direction: column; padding: 2vh; gap: 1.5vh;
            box-sizing: border-box; height: 100%; overflow-y: auto;
        }

        .inference-views-container {
            display: grid;
            grid-template-areas: 
                "front-view left-view"
                "top-view   none";
            grid-template-columns: 1fr 1fr; 
            grid-template-rows: auto auto;
            gap: 2.5vh;
            width: 100%;
            margin: 1vh 0;
        }

        .inf-view-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .inf-view-card .canvas-wrapper {
            width: 18vh;
            height: 18vh;
            border: 4px solid #CFD8DC;
            background: #FFF;
            border-radius: 0 !important; 
            box-shadow: 0 6px 0 rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            overflow: hidden;
        }

        .inf-view-card canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }

        .inf-view-card .label {
            margin-top: 0.8vh;
            font-size: clamp(10px, 1.4vh, 14px);
            font-weight: bold;
            text-align: center;
            min-width: 60%; 
            padding: 4px 12px;
            border-radius: 20px; 
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 0px rgba(0,0,0,0.1);
        }

        .inf-area-front { grid-area: front-view; }
        .inf-area-left  { grid-area: left-view; }
        .inf-area-top   { grid-area: top-view; }

        .inf-v3-actions {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 1vh;
        }

        .inf-btn-group-horizontal {
            display: flex;
            width: 100%;
            gap: 15px;
        }

        .inf-action-btn {
            flex: 1;
            padding: 1.5vh 0 !important;
            font-size: clamp(12px, 1.4vh, 15px) !important;
            border-radius: 25px !important;
            min-height: 46px;
        }

        .inf-footer-group {
            margin-top: auto; 
            display: flex;
            flex-direction: column;
            gap: 1.5vh;
            width: 100%;
        }

        .inf-v3-stats {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 1.5vh 0;
            background: #F1F8E9; 
            border: 3px solid #C8E6C9; 
            border-radius: 25px;
            box-shadow: 0 6px 0px #A5D6A7; 
            font-size: clamp(13px, 1.6vh, 18px);
            color: #2E7D32;
            font-weight: bold;
        }

        #inf-v3-count {
            color: #FF5252;
            font-size: clamp(18px, 3vh, 32px);
            font-weight: 900;
        }

        .inf-reset-btn {
            width: 100% !important;
            min-height: 46px;
        }

        .modal-overlay { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100vw; height: 100vh; 
            background: rgba(0,0,0,0.7); 
            display: none; 
            justify-content: center; 
            align-items: center; 
            z-index: 99999;
        }
        .modal-content { 
            background: #fff; 
            padding: 30px; 
            border-radius: 20px; 
            max-width: 500px; 
            width: 85%; 
            line-height: 1.9;
            text-align: left;
        }
        .modalBtn {
            background: #81D4FA;
            color: white;
            border: 0;
            padding: 10px 26px;
            border-radius: 14px;
            margin-top: 10px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body class="mode-build"> 
    <div id="main-wrapper">
        <header id="mode-header">
            <div class="mode-group">
                <button id="mode-build" class="mode-btn active">建模绘制模式</button>
                <button id="mode-challenge" class="mode-btn">平面标数模式</button>
                <button id="mode-inference" class="mode-btn">立方体块最大最小数量问题</button>
            </div>
        </header>

        <main id="canvas-container"></main>

        <aside id="ui-panel">
            <section id="ui-build-group">
                <button class="help-btn">❔ 建模使用说明</button>
                <input type="text" id="size-input" placeholder="长*宽*高 (例: 5*5*3)">
                <button class="gen-btn">快速生成</button>
                <button class="front-view-btn color-front">生成正视图</button>
                <button class="left-view-btn color-left">生成左视图</button>
                <button class="top-view-btn color-top">生成俯视图</button>
                <button class="reset-cam-btn">自由视角</button>
                <button class="scene-reset-btn">场景重置</button>
            </section>
            <section id="ui-challenge-group">
                <button class="help-mark-btn">🔢 标数法使用说明</button>
                <div id="grid-control-panel"></div>
                <button class="clear-mark-btn">清空所有标数</button>
            </section>
        </aside>

        <aside id="inference-sidebar-v3">
            <p>点击下方视口方格绘制轮廓，分析最大最小问题。</p>
            <div class="inference-views-container">
                <div class="inf-view-card"><div class="canvas-wrapper"><canvas width="240" height="240"></canvas></div><div class="label color-left">左视图</div></div>
                <div class="inf-view-card"><div class="canvas-wrapper"><canvas width="240" height="240"></canvas></div><div class="label color-front">正视图</div></div>
                <div class="inf-view-card"><div class="canvas-wrapper"><canvas width="240" height="240"></canvas></div><div class="label color-top">俯视图</div></div>
            </div>
            <button class="inf-max-btn inf-action-btn">最大数量</button>
            <button class="inf-min-btn inf-action-btn">最小数量</button>
            <div class="inf-v3-stats">积木总数：<strong id="inf-total-count">0</strong></div>
            <button class="inf-reset-btn">清空所有视口</button>
        </aside>

        <footer id="bottom-panel">
            <div class="projection-card"><canvas id="front-proj-canvas" width="200" height="200"></canvas><div class="label">正视图</div></div>
            <div class="projection-card"><canvas id="left-proj-canvas" width="200" height="200"></canvas><div class="label">左视图</div></div>
            <div class="projection-card"><canvas id="top-proj-canvas" width="200" height="200"></canvas><div class="label">俯视图</div></div>
        </footer>
    </div>

    <div class="modal-overlay" id="buildModal">
        <div class="modal-content">
            <h3>📘 建模模式操作说明</h3>
            <p>🖱️ <strong>鼠标操作：</strong></p>
            <p>• 左键单击 = 添加立方体</p>
            <p>• 右键单击 = 删除立方体</p>
            <p>• 鼠标拖动 = 旋转视角</p>
            <p>• 滚轮滚动 = 缩放视角</p>
            <br>
            <p>📱 <strong>平板 / 手机触控：</strong></p>
            <p>• 单击 = 添加立方体</p>
            <p>• 双击 = 删除立方体</p>
            <p>• 单指拖动 = 旋转3D视角</p>
            <p>• 双指捏合 = 缩放视角</p>
            <button class="modalBtn" onclick="closeAllModals()">确定</button>
        </div>
    </div>

    <div class="modal-overlay" id="markModal">
        <div class="modal-content">
            <h3>🔢 平面标数模式说明</h3>
            <p>🖱️ <strong>鼠标：</strong> 点击方格进行标注</p>
            <p>📱 <strong>平板：</strong> 手指点击方格进行标注</p>
            <p>用于练习三视图投影、方格计数、平面坐标训练</p>
            <button class="modalBtn" onclick="closeAllModals()">确定</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // ======================= 全局3D核心 (完整重构确保可用) =======================
        let scene, camera, renderer, controls;
        let cubesGroup;               // 所有积木块组
        let gridSizeX = 6, gridSizeZ = 6, maxHeight = 5;    // 工作区6x6,最高5层
        let cubesMap = new Map();     // key: "x,y,z" 存储Mesh
        
        const container = document.getElementById('canvas-container');
        
        function initThree() {
            if(!container) return;
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xEFF5FF);
            scene.fog = new THREE.FogExp2(0xEFF5FF, 0.008);
            
            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(10, 8, 12);
            camera.lookAt(0, 2, 0);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.shadowMap.enabled = true; // 开启阴影映射
            container.innerHTML = '';
            container.appendChild(renderer.domElement);
            
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.rotateSpeed = 1.0;
            controls.zoomSpeed = 1.2;
            controls.enableZoom = true;
            controls.enablePan = true;
            controls.target.set(0, 2, 0);
            
            // 地面网格
            const gridHelper = new THREE.GridHelper(14, 20, 0x88A9C4, 0xC5E0F0);
            gridHelper.position.y = -0.01;
            scene.add(gridHelper);
            
            // 辅助地板半透明平面
            const planeMat = new THREE.MeshStandardMaterial({ color: 0xE1F5FE, roughness: 0.8, metalness: 0.1, transparent: true, opacity: 0.3 });
            const groundPlane = new THREE.Mesh(new THREE.PlaneGeometry(8, 8), planeMat);
            groundPlane.rotation.x = -Math.PI / 2;
            groundPlane.position.y = -0.02;
            scene.add(groundPlane);
            
            // 灯光
            const ambientLight = new THREE.AmbientLight(0x606060);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(3, 8, 2);
            dirLight.castShadow = true;
            dirLight.receiveShadow = true;
            scene.add(dirLight);
            const fillLight = new THREE.PointLight(0xccaa88, 0.4);
            fillLight.position.set(-2, 3, 4);
            scene.add(fillLight);
            
            cubesGroup = new THREE.Group();
            scene.add(cubesGroup);
            
            animate();
            window.addEventListener('resize', onWindowResize, false);
        }
        
        function onWindowResize() {
            if(!camera || !renderer) return;
            const width = container.clientWidth;
            const height = container.clientHeight;
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            if(controls) controls.update();
            if(renderer && scene && camera) renderer.render(scene, camera);
        }
        
        // 添加立方体 (坐标范围 -gridSizeX/2 ~ gridSizeX/2)
        function addCubeAtWorld(px, pz, pyLevel) {
            if(pyLevel < 0 || pyLevel >= maxHeight) return false;
            const key = `${px},${pz},${pyLevel}`;
            if(cubesMap.has(key)) return false;
            const geometry = new THREE.BoxGeometry(0.92, 0.92, 0.92);
            const material = new THREE.MeshStandardMaterial({ color: 0x4FC3F7, emissive: 0x0, roughness: 0.3, metalness: 0.05 });
            const cube = new THREE.Mesh(geometry, material);
            cube.position.set(px, pyLevel + 0.5, pz);
            cube.castShadow = true;
            cube.receiveShadow = true;
            cubesGroup.add(cube);
            cubesMap.set(key, cube);
            updateProjections();
            return true;
        }
        
        function removeCubeAt(px, pz, pyLevel) {
            const key = `${px},${pz},${pyLevel}`;
            const cube = cubesMap.get(key);
            if(cube) {
                cubesGroup.remove(cube);
                cube.geometry.dispose();
                cube.material.dispose();
                cubesMap.delete(key);
                updateProjections();
                return true;
            }
            return false;
        }
        
        // 射线检测: 获取点击位置对应的底面网格坐标和高度
        function getGridFromRaycast(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            const mouse = new THREE.Vector2();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            // 检测一个虚拟平面用于获取落点位置（y=0平面及辅助）
            const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
            const targetPoint = new THREE.Vector3();
            if(raycaster.ray.intersectPlane(plane, targetPoint)) {
                let x = Math.round(targetPoint.x);
                let z = Math.round(targetPoint.z);
                // 限定范围: -3..3 对应6x6
                const half = Math.floor(gridSizeX/2);
                if(x < -half || x > half || z < -half || z > half) return null;
                // 获取当前列最高已有方块高度
                let maxH = -1;
                for(let h = 0; h < maxHeight; h++) {
                    const k = `${x},${z},${h}`;
                    if(cubesMap.has(k)) maxH = h;
                    else break;
                }
                return { x, z, height: maxH + 1 };
            }
            return null;
        }
        
        // 事件绑定
        function bind3DEvents() {
            if(!renderer) return;
            const dom = renderer.domElement;
            let lastTapTime = 0;
            dom.addEventListener('click', (e) => {
                const now = Date.now();
                if(now - lastTapTime < 300) {
                    // 双击删除
                    const hit = getGridFromRaycast(e);
                    if(hit && hit.height-1 >= 0) removeCubeAt(hit.x, hit.z, hit.height-1);
                } else {
                    setTimeout(() => {
                        if(Date.now() - lastTapTime > 290) {
                            const hit = getGridFromRaycast(e);
                            if(hit && hit.height < maxHeight) addCubeAtWorld(hit.x, hit.z, hit.height);
                        }
                    }, 280);
                }
                lastTapTime = now;
            });
            dom.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                const hit = getGridFromRaycast(e);
                if(hit && hit.height-1 >= 0) removeCubeAt(hit.x, hit.z, hit.height-1);
            });
            // 触摸优化
            dom.addEventListener('touchstart', (e) => {
                if(e.touches.length === 1) {
                    const touch = e.touches[0];
                    const fakeEvent = { clientX: touch.clientX, clientY: touch.clientY };
                    const now = Date.now();
                    if(now - lastTapTime < 300) {
                        const hit = getGridFromRaycast(fakeEvent);
                        if(hit && hit.height-1 >= 0) removeCubeAt(hit.x, hit.z, hit.height-1);
                        e.preventDefault();
                    } else {
                        setTimeout(() => {
                            if(Date.now() - lastTapTime > 290) {
                                const hit2 = getGridFromRaycast(fakeEvent);
                                if(hit2 && hit2.height < maxHeight) addCubeAtWorld(hit2.x, hit2.z, hit2.height);
                            }
                        }, 280);
                    }
                    lastTapTime = now;
                }
            });
        }
        
        // 更新三视图投影 (正、左、俯) 利用二维canvas绘图
        function updateProjections() {
            const size = 6; // -3..3 索引 0..5
            let front = Array(size).fill().map(() => Array(size).fill(0));
            let left = Array(size).fill().map(() => Array(size).fill(0));
            let top = Array(size).fill().map(() => Array(size).fill(0));
            
            for(let [key, cube] of cubesMap.entries()) {
                const [x, z, y] = key.split(',').map(Number);
                const idxX = x + 3;   // 0..5
                const idxZ = z + 3;
                const h = y + 1;
                // 正视图: 前视方向 Z轴映射 X(横) Y(高)
                if(front[idxX] && front[idxX][idxZ] < h) front[idxX][idxZ] = h;
                // 左视图: X轴方向 实际左视: 从左边看, 对应Z轴深度与高度
                if(left[idxZ] && left[idxZ][idxX] < h) left[idxZ][idxX] = h;
                // 俯视图: 从上往下, 显示高度数字 (格子内)
                if(top[idxX] && top[idxX][idxZ] < h) top[idxX][idxZ] = h;
            }
            
            function drawOnCanvas(canvasId, data, title) {
                const canvas = document.getElementById(canvasId);
                if(!canvas) return;
                const ctx = canvas.getContext('2d');
                const w = canvas.width, h = canvas.height;
                const cellW = w / 6, cellH = h / 6;
                ctx.clearRect(0, 0, w, h);
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(0, 0, w, h);
                ctx.strokeStyle = '#AAAAAA';
                for(let i=0;i<=6;i++) {
                    ctx.beginPath();
                    ctx.moveTo(i*cellW, 0); ctx.lineTo(i*cellW, h); ctx.stroke();
                    ctx.moveTo(0, i*cellH); ctx.lineTo(w, i*cellH); ctx.stroke();
                }
                for(let i=0;i<6;i++){
                    for(let j=0;j<6;j++){
                        let val = data[i]?.[j] || 0;
                        if(val > 0){
                            ctx.fillStyle = '#81C784';
                            ctx.fillRect(i*cellW, j*cellH, cellW-1, cellH-1);
                            ctx.fillStyle = '#1B5E20';
                            ctx.font = `bold ${Math.max(12, cellW*0.3)}px Arial`;
                            ctx.fillText(val, i*cellW + cellW*0.35, j*cellH + cellH*0.65);
                        }
                    }
                }
                ctx.fillStyle = '#5D4037';
                ctx.font = 'bold 12px Arial';
                ctx.fillText(title, 5, 18);
            }
            
            drawOnCanvas('front-proj-canvas', front, '正视图');
            drawOnCanvas('left-proj-canvas', left, '左视图');
            drawOnCanvas('top-proj-canvas', top, '俯视图');
        }
        
        // 清空所有立方体
        function clearAllCubes() {
            cubesMap.forEach((cube) => {
                cubesGroup.remove(cube);
                cube.geometry.dispose();
                cube.material.dispose();
            });
            cubesMap.clear();
            updateProjections();
        }
        
        // 根据字符串生成立方体 (格式: 5*5*3)
        function generateBySize(str) {
            const parts = str.split('*');
            if(parts.length !== 3) return false;
            let sx = parseInt(parts[0]), sz = parseInt(parts[1]), sy = parseInt(parts[2]);
            if(isNaN(sx) || isNaN(sz) || isNaN(sy)) return false;
            sx = Math.min(sx, gridSizeX);
            sz = Math.min(sz, gridSizeZ);
            sy = Math.min(sy, maxHeight);
            clearAllCubes();
            const offsetX = -Math.floor(sx/2);
            const offsetZ = -Math.floor(sz/2);
            for(let i=0;i<sx;i++){
                for(let j=0;j<sz;j++){
                    for(let k=0;k<sy;k++){
                        addCubeAtWorld(offsetX + i, offsetZ + j, k);
                    }
                }
            }
            return true;
        }
        
        // 根据三视图生成简单示例
        function genFromFront() { generateBySize('4*4*3'); }
        function genFromLeft() { generateBySize('5*4*2'); }
        function genFromTop() { generateBySize('4*5*4'); }
        
        // 初始化所有UI交互
        function initUI() {
            document.querySelector('#ui-build-group .help-btn').onclick = () => { document.getElementById('buildModal').style.display = 'flex'; };
            document.querySelector('#ui-challenge-group .help-mark-btn').onclick = () => { document.getElementById('markModal').style.display = 'flex'; };
            document.querySelector('#ui-build-group .gen-btn').onclick = () => {
                const val = document.getElementById('size-input').value;
                if(val) generateBySize(val);
                else generateBySize('4*4*3');
            };
            document.querySelector('#ui-build-group .front-view-btn').onclick = genFromFront;
            document.querySelector('#ui-build-group .left-view-btn').onclick = genFromLeft;
            document.querySelector('#ui-build-group .top-view-btn').onclick = genFromTop;
            document.querySelector('#ui-build-group .reset-cam-btn').onclick = () => { if(camera) { camera.position.set(10,8,12); controls.target.set(0,2,0); controls.update(); } };
            document.querySelector('#ui-build-group .scene-reset-btn').onclick = () => { clearAllCubes(); };
            document.querySelector('#ui-challenge-group .clear-mark-btn').onclick = () => { alert('标数模式可在此扩展具体练习'); };
            
            // 推理模式简易示例
            const infReset = document.querySelector('#inference-sidebar-v3 .inf-reset-btn');
            if(infReset) infReset.onclick = () => { alert('清空视口逻辑(演示)'); };
            document.querySelector('#inference-sidebar-v3 .inf-max-btn').onclick = () => { document.getElementById('inf-total-count').innerText = '36'; };
            document.querySelector('#inference-sidebar-v3 .inf-min-btn').onclick = () => { document.getElementById('inf-total-count').innerText = '12'; };
        }
        
        // 模式切换修复
        function switchMode(mode, evt) {
            document.body.classList.remove('mode-build');
            document.getElementById('main-wrapper').classList.remove('challenge-layout', 'inference-layout');
            if (mode === 'build') document.body.classList.add('mode-build');
            if (mode === 'challenge') document.getElementById('main-wrapper').classList.add('challenge-layout');
            if (mode === 'inference') document.getElementById('main-wrapper').classList.add('inference-layout');
            document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
            if(evt) evt.target.classList.add('active');
        }
        
        // 全局关闭弹窗
        window.closeAllModals = function() {
            document.querySelectorAll('.modal-overlay').forEach(m=> m.style.display = 'none');
        };
        
        // 启动所有
        window.onload = () => {
            initThree();
            setTimeout(() => {
                bind3DEvents();
                generateBySize('4*3*2');  // 默认展示模型
            }, 200);
            initUI();
            document.getElementById('mode-build').onclick = (e) => switchMode('build', e);
            document.getElementById('mode-challenge').onclick = (e) => switchMode('challenge', e);
            document.getElementById('mode-inference').onclick = (e) => switchMode('inference', e);
            // 简单标数面板占位（平面标数模式可交互）
            const gridPanel = document.getElementById('grid-control-panel');
            if(gridPanel){
                for(let i=0;i<100;i++){
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    cell.innerText = '0';
                    cell.onclick = (()=>{
                        let v = parseInt(cell.innerText);
                        v = (v+1)%4;
                        cell.innerText = v;
                        if(v>0) cell.classList.add('active');
                        else cell.classList.remove('active');
                    });
                    gridPanel.appendChild(cell);
                }
            }
        };
        
        window.addCube = ()=>{};
        window.removeCube = ()=>{};
    </script>
</body>
</html>
